name: Bug Report
description: Report a bug in Synapps
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Index a project with `synapps index .`
        2. Run `synapps callers "MyClass.MyMethod"`
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages or output if applicable.
    validations:
      required: true

  - type: input
    id: synapps-version
    attributes:
      label: Synapps version
      description: Output of `pip show synapps | grep Version`
      placeholder: "0.1.0"

  - type: dropdown
    id: language
    attributes:
      label: Language being indexed
      options:
        - C#
        - Python
        - TypeScript / JavaScript
        - Java
        - Multiple
        - N/A

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Docker version, etc.
      placeholder: |
        - OS: macOS 14.5
        - Python: 3.11.9
        - Docker: 26.1.1
